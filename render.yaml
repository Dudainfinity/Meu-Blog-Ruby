services:
  - type: web
    name: meu-blog-ruby
    runtime: ruby
    plan: free
    buildCommand: bundle install && SECRET_KEY_BASE_DUMMY=1 bundle exec rails assets:precompile
    startCommand: bundle exec rails db:migrate && bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: meu-blog-ruby-db
          property: connectionString

databases:
  - name: meu-blog-ruby-db
    plan: free
